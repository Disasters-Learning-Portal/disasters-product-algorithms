name: Build & push hub image (dev)

on:
  push:
    branches: [dev]
    paths-ignore:
      - 'docs/**'
      - 'notebooks/**'
      - 'tests/**'
      - 'tools/**'
      - '**.md'
      - '.clinerules.md'
      - '.pre-commit-config.yaml'
  workflow_dispatch:

jobs:
  build:
    name: Build & push klesinger/disasters-jupyterhub-docker-image-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build image
        # Same as the prod workflow but pushes the -dev variant. See
        # build-and-push.yaml for layer-cache and .dockerignore notes.
        run: |
          docker build \
            -f image/Dockerfile \
            -t "${{ secrets.DOCKER_USERNAME }}/disasters-jupyterhub-docker-image-dev:${GITHUB_SHA::12}" \
            --cache-from "${{ secrets.DOCKER_USERNAME }}/disasters-jupyterhub-docker-image-dev:latest" \
            .

      - name: Tag & push
        run: |
          docker tag \
            "${{ secrets.DOCKER_USERNAME }}/disasters-jupyterhub-docker-image-dev:${GITHUB_SHA::12}" \
            "${{ secrets.DOCKER_USERNAME }}/disasters-jupyterhub-docker-image-dev:latest"
          docker push "${{ secrets.DOCKER_USERNAME }}/disasters-jupyterhub-docker-image-dev:${GITHUB_SHA::12}"
          docker push "${{ secrets.DOCKER_USERNAME }}/disasters-jupyterhub-docker-image-dev:latest"
