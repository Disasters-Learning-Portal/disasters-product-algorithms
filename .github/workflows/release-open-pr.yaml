name: Release · Open PR (dev → main)

# Step 1 of 2 in the release flow.
#
# Trigger: manual, from the Actions tab UI ("Run workflow" button on the right).
# Gated by the `release` environment, which has required reviewers configured
# so only the admin can actually start a release. Anyone with write to the repo
# can fire the dispatch, but the job will pause until an admin clicks Approve.
#
# What this does:
#   1. Validates the version string (vX.Y.Z).
#   2. Validates that RELEASE_NOTES_<version>.md exists on dev.
#   3. Validates that the tag <version> doesn't already exist.
#   4. Opens a PR `dev → main` titled "Release <version>" with the release
#      notes file content as the PR body.
#
# You then click Merge on the PR (in the GitHub UI). That triggers the
# second workflow, release-tag.yaml, which tags and publishes the release.
#
# Setup (one-time):
#   GitHub repo Settings → Environments → New environment → name: `release`
#   → "Required reviewers" → add your admin user.
#   Without this environment, the workflow_dispatch is ungated.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g. v1.0.0). Must match vX.Y.Z. RELEASE_NOTES_<version>.md must exist on dev.'
        required: true
        type: string

jobs:
  open-release-pr:
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Validate version format
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Version must match vX.Y.Z (got: ${{ inputs.version }})"
            exit 1
          fi

      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev
          fetch-depth: 0

      - name: Verify release notes file exists
        run: |
          FILE="RELEASE_NOTES_${{ inputs.version }}.md"
          if [ ! -f "$FILE" ]; then
            echo "::error::Expected $FILE at repo root on dev, but it does not exist. Commit the release notes file to dev first."
            exit 1
          fi
          echo "RELEASE_NOTES_FILE=$FILE" >> "$GITHUB_ENV"

      - name: Verify tag does not already exist
        run: |
          git fetch --tags
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ inputs.version }} already exists."
            exit 1
          fi

      - name: Check for existing open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --base main --head dev --state open --json number,title --jq '.[] | select(.title | startswith("Release ")) | .number' || true)
          if [ -n "$EXISTING" ]; then
            echo "::error::An open release PR already exists: #$EXISTING. Close or merge it first."
            exit 1
          fi

      - name: Open release PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head dev \
            --title "Release ${{ inputs.version }}" \
            --body-file "$RELEASE_NOTES_FILE"
