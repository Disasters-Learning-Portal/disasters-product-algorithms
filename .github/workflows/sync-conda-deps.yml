name: Sync conda deps to pangeo-notebook-veda-image

on:
  push:
    branches:
      - main
    paths:
      - hub-conda-deps.txt
  workflow_dispatch:

jobs:
  sync:
    name: Open PR in image repo
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4
        with:
          path: algorithms

      - name: Checkout image repo
        uses: actions/checkout@v4
        with:
          repository: Disasters-Learning-Portal/pangeo-notebook-veda-image
          token: ${{ secrets.PANGEO_REBUILD_TOKEN }}
          path: image

      - name: Apply managed block to image-repo environment.yml
        run: |
          python <<'PY'
          from pathlib import Path

          BEGIN = "# === BEGIN disasters-product-algorithms managed conda deps (do not edit by hand) ==="
          END = "# === END disasters-product-algorithms managed conda deps ==="

          deps_path = Path("algorithms/hub-conda-deps.txt")
          env_path = Path("image/environment.yml")

          deps = [
              line.strip()
              for line in deps_path.read_text().splitlines()
              if line.strip() and not line.lstrip().startswith("#")
          ]

          env_text = env_path.read_text()
          if BEGIN not in env_text or END not in env_text:
              raise SystemExit(
                  f"Missing managed-block markers in {env_path}.\n"
                  f"Expected these two lines somewhere under `dependencies:`:\n"
                  f"  {BEGIN}\n  {END}\n"
                  f"Add them once (with no content between) and merge that "
                  f"setup change directly in the image repo, then this auto-sync "
                  f"will populate the block on subsequent changes here."
              )

          out, in_block = [], False
          for line in env_text.splitlines():
              if BEGIN in line:
                  out.append(line)
                  for dep in deps:
                      out.append(f"  - {dep}")
                  in_block = True
                  continue
              if END in line:
                  out.append(line)
                  in_block = False
                  continue
              if in_block:
                  continue
              out.append(line)

          env_path.write_text("\n".join(out) + "\n")
          print(f"Wrote {len(deps)} managed conda dep(s) to {env_path}.")
          PY

      - name: Open PR in image repo
        uses: peter-evans/create-pull-request@v6
        with:
          path: image
          token: ${{ secrets.PANGEO_REBUILD_TOKEN }}
          commit-message: |
            chore: sync managed conda deps from disasters-product-algorithms@${{ github.sha }}
          title: 'Sync managed conda deps from disasters-product-algorithms'
          body: |
            Auto-PR from `disasters-product-algorithms` to update the
            managed conda-deps block in `environment.yml`.

            **Source commit:** ${{ github.repository }}@${{ github.sha }}

            **What changed:** Contents of the block between the
            `BEGIN / END disasters-product-algorithms managed conda deps`
            markers have been regenerated from
            [`hub-conda-deps.txt`](https://github.com/${{ github.repository }}/blob/${{ github.sha }}/hub-conda-deps.txt).

            **What to do:** Review the diff. If it looks right, merge.
            The next image build will pick it up via the `ALGORITHMS_SHA`
            cache-buster wired into the Dockerfile, no other action needed.
          branch: sync-conda-deps-from-algorithms
          delete-branch: true
          add-paths: environment.yml
