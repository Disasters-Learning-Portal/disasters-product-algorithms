name: Trigger Docker Image Rebuild (testMerge)

on:
  push:
    branches:
      - merge-aws-conversion
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'
      - '.github/DOCKER_REBUILD_SETUP.md'

jobs:
  trigger-rebuild:
    name: Notify pangeo-notebook-veda-image (testMerge)
    runs-on: ubuntu-latest

    steps:
      - name: Check if PANGEO_REBUILD_TOKEN_DEV is set
        run: |
          if [ -z "${{ secrets.PANGEO_REBUILD_TOKEN_DEV }}" ]; then
            echo "::error::PANGEO_REBUILD_TOKEN_DEV secret is not set!"
            echo "Please follow the setup instructions in .github/DOCKER_REBUILD_SETUP.md"
            exit 1
          fi
          echo "✓ Token is configured"

      - name: Trigger pangeo-notebook-veda-image rebuild (testMerge branch)
        run: |
          echo "Sending repository_dispatch event to pangeo-notebook-veda-image (testMerge branch)..."

          response=$(curl -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.PANGEO_REBUILD_TOKEN_DEV }}" \
            https://api.github.com/repos/Disasters-Learning-Portal/pangeo-notebook-veda-image/dispatches \
            -d '{"event_type":"algorithm-updated-testmerge","client_payload":{"sha":"${{ github.sha }}","ref":"${{ github.ref }}","repository":"${{ github.repository }}","branch":"testMerge"}}')

          http_code=$(echo "$response" | tail -n1)

          if [ "$http_code" = "204" ]; then
            echo "✓ Successfully triggered testMerge branch rebuild!"
          else
            echo "::error::Failed to trigger testMerge branch build (HTTP $http_code)"
            exit 1
          fi

      - name: Workflow summary
        run: |
          echo "### ✅ Docker Image Rebuild Triggered (testMerge)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Successfully triggered rebuild of pangeo-notebook-veda-image Docker image on **testMerge branch**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered Branch:** testMerge" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Source Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Source Ref: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Source Repository: \`${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Monitor Build Progress:**" >> $GITHUB_STEP_SUMMARY
          echo "- [View Actions](https://github.com/Disasters-Learning-Portal/pangeo-notebook-veda-image/actions)" >> $GITHUB_STEP_SUMMARY
