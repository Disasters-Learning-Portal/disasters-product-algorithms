name: Trigger Docker Image Rebuild

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'
      - '.github/DOCKER_REBUILD_SETUP.md'

jobs:
  trigger-rebuild:
    name: Notify pangeo-notebook-veda-image
    runs-on: ubuntu-latest

    steps:
      - name: Check if PANGEO_REBUILD_TOKEN is set
        run: |
          if [ -z "${{ secrets.PANGEO_REBUILD_TOKEN }}" ]; then
            echo "::error::PANGEO_REBUILD_TOKEN secret is not set!"
            echo "Please follow the setup instructions in .github/DOCKER_REBUILD_SETUP.md"
            exit 1
          fi
          echo "✓ Token is configured"

      - name: Trigger pangeo-notebook-veda-image rebuild
        run: |
          echo "Sending repository_dispatch event to pangeo-notebook-veda-image..."

          response=$(curl -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${{ secrets.PANGEO_REBUILD_TOKEN }}" \
            https://api.github.com/repos/Disasters-Learning-Portal/pangeo-notebook-veda-image/dispatches \
            -d '{"event_type":"algorithm-updated","client_payload":{"sha":"${{ github.sha }}","ref":"${{ github.ref }}","repository":"${{ github.repository }}"}}')

          http_code=$(echo "$response" | tail -n1)
          body=$(echo "$response" | head -n-1)

          echo "HTTP Status Code: $http_code"

          if [ "$http_code" = "204" ]; then
            echo "✓ Successfully triggered rebuild!"
            echo "The pangeo-notebook-veda-image workflow will run on all branches with the workflow file."
          elif [ "$http_code" = "401" ]; then
            echo "::error::Authentication failed! Check that PANGEO_REBUILD_TOKEN has 'repo' scope."
            exit 1
          elif [ "$http_code" = "404" ]; then
            echo "::error::Repository not found! Check that the token has access to pangeo-notebook-veda-image."
            exit 1
          else
            echo "::error::Unexpected response code: $http_code"
            echo "$body"
            exit 1
          fi

      - name: Workflow summary
        run: |
          echo "### ✅ Docker Image Rebuild Triggered" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Successfully triggered rebuild of pangeo-notebook-veda-image Docker image." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Commit: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- Branch: ${{ github.ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- Repository: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Monitor the build progress at:" >> $GITHUB_STEP_SUMMARY
          echo "https://github.com/Disasters-Learning-Portal/pangeo-notebook-veda-image/actions" >> $GITHUB_STEP_SUMMARY
