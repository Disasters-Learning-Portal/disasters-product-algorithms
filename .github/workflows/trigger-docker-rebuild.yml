name: Trigger Docker Image Rebuild

on:
  push:
    branches:
      - main
      - dev
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'notebooks/**'
      - '.github/DOCKER_REBUILD_SETUP.md'

jobs:
  trigger-rebuild:
    name: Notify pangeo-notebook-veda-image (${{ github.ref_name }})
    runs-on: ubuntu-latest

    env:
      PANGEO_TOKEN: ${{ github.ref == 'refs/heads/main' && secrets.PANGEO_REBUILD_TOKEN || secrets.PANGEO_REBUILD_TOKEN_DEV }}
      EVENT_TYPE: ${{ github.ref == 'refs/heads/main' && 'algorithm-updated' || 'algorithm-updated-dev' }}
      TOKEN_NAME: ${{ github.ref == 'refs/heads/main' && 'PANGEO_REBUILD_TOKEN' || 'PANGEO_REBUILD_TOKEN_DEV' }}

    steps:
      - name: Check if dispatch token is set
        run: |
          if [ -z "${PANGEO_TOKEN}" ]; then
            echo "::error::${TOKEN_NAME} secret is not set for branch ${{ github.ref_name }}!"
            echo "Please follow the setup instructions in .github/DOCKER_REBUILD_SETUP.md"
            exit 1
          fi
          echo "✓ ${TOKEN_NAME} is configured"

      - name: Trigger pangeo-notebook-veda-image rebuild (${{ github.ref_name }})
        run: |
          echo "Sending repository_dispatch event_type=${EVENT_TYPE} to pangeo-notebook-veda-image..."

          response=$(curl -w "\n%{http_code}" -X POST \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Authorization: token ${PANGEO_TOKEN}" \
            https://api.github.com/repos/Disasters-Learning-Portal/pangeo-notebook-veda-image/dispatches \
            -d "{\"event_type\":\"${EVENT_TYPE}\",\"client_payload\":{\"sha\":\"${{ github.sha }}\",\"ref\":\"${{ github.ref }}\",\"repository\":\"${{ github.repository }}\",\"branch\":\"${{ github.ref_name }}\"}}")

          http_code=$(echo "$response" | tail -n1)

          if [ "$http_code" = "204" ]; then
            echo "✓ Successfully triggered rebuild for ${{ github.ref_name }} branch (event_type=${EVENT_TYPE})"
          else
            echo "::error::Failed to trigger ${{ github.ref_name }} branch build (HTTP $http_code)"
            exit 1
          fi

      - name: Workflow summary
        run: |
          echo "### ✅ Docker Image Rebuild Triggered (${{ github.ref_name }})" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Successfully triggered rebuild of pangeo-notebook-veda-image Docker image on **${{ github.ref_name }} branch**." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Details:**" >> $GITHUB_STEP_SUMMARY
          echo "- Source Branch: \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Source Commit: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Source Ref: \`${{ github.ref }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Source Repository: \`${{ github.repository }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Dispatch Event Type: \`${EVENT_TYPE}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Monitor Build Progress:**" >> $GITHUB_STEP_SUMMARY
          echo "- [View Actions](https://github.com/Disasters-Learning-Portal/pangeo-notebook-veda-image/actions)" >> $GITHUB_STEP_SUMMARY
